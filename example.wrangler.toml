name = "rage2-worker"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding         = "DB"
database_name   = "rage2"
database_id     = "<Set your own DB id>"
migrations_dir  = "worker/migrations"
[[queues.producers]]
binding    = "PLAYLIST_QUEUE"
queue      = "rage2-playlist-scrape"

[[queues.consumers]]
queue              = "rage2-playlist-scrape"
max_batch_size     = 5
max_batch_timeout  = 30

[triggers]
crons = ["0 6 * * 6"]   # 6 AM every Saturday (after RAGE airs)
